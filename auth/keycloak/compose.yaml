services:
  keycloak-postgres:
    image: postgres:17-alpine
    container_name: keycloak-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - /opt/docker/data/keycloak-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - default

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    restart: unless-stopped
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KC_BOOTSTRAP_ADMIN_USERNAME}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KC_BOOTSTRAP_ADMIN_PASSWORD}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-postgres:5432/${POSTGRES_DB}
      - KC_DB_USERNAME=${KC_DB_USERNAME}
      - KC_HOSTNAME_ADMIN=https://kc.example.com
      - KC_DB_PASSWORD=${KC_DB_PASSWORD}
      - KC_HOSTNAME=https://${KEYCLOAK_HOSTNAME}
      - KC_HTTP_ENABLED=true
      - KC_PROXY_HEADERS=xforwarded
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
    volumes:
      - /opt/docker/data/keycloak-themes:/opt/keycloak/themes:ro
    command: ["start"]
    networks:
      - default
      - proxy

networks:
  proxy:
    external: true
