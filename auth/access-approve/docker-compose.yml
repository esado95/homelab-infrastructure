services:
  access-approve:
    build: .
    image: access-approve:latest
    container_name: access-approve
    restart: unless-stopped
    env_file: .env
    volumes:
      # état du notificateur (qui a déjà été notifié) pour éviter les envois en double
      - /opt/docker/data/access-approve:/data
    networks:
      - proxy   # Caddy et Keycloak vivent sur ce réseau -> accessibilité mutuelle

networks:
  proxy:
    external: true
